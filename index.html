<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumapuyo</title>

    <script src="src/top.js" defer></script>
    <link rel="stylesheet" href="css/top.css">
</head>

<body>
    <div class="titleScreen" id="titleScreen">
        <div class="sparkLayer" aria-hidden="true"></div>
        <div class="titleInner">
            <h1 class="logo"><span data-text="Lumapuyo">Lumapuyo</span></h1>
            <p class="subtitle">Color Chain Puzzle</p>

            <button class="startBtn" id="startBtn">START</button>
            <button class="howBtn" id="howBtn">HOW TO PLAY</button>
        </div>
    </div>

    <div class="modal" id="howModal" aria-hidden="true">
        <div class="modal__backdrop" data-close></div>

        <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="howTitle">
            <button class="modal__close" type="button" aria-label="閉じる" data-close>×</button>

            <h2 class="modal__title" id="howTitle">操作方法</h2>

            <div class="modal__content">
                <ol class="howList">
                    <li class="pcOnly">← →：移動</li>
                    <li class="pcOnly">↑：左回転</li>
                    <li class="pcOnly">Z：右回転</li>
                    <li class="pcOnly">↓：落下加速</li>
                    <li class="pcOnly">同じ色を4つ以上つなげると消える</li>
                    <li class="pcOnly">連鎖するとスコアUP！</li>
                    <li class="pcOnly">詰まったら R でリトライ / T でタイトル画面に戻る</li>
                </ol>
                <div class="howNote">
                    <div class="howNote__title">スマホ操作</div>
                    <div class="howNote__body">
                        左右スワイプ = 移動<br>
                        下スワイプ = 落下加速<br>
                        タップ = 回転<br>
                        長押し = 連続落下
                    </div>
                </div>

                <div class="modal__actions">
                    <button class="modal__btn" type="button" data-close>OK</button>
                </div>
            </div>
        </div>

</body>

</html>
