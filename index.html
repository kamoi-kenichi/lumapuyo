<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぷよぷよ</title>
    <script src="src/config.js"></script>
    <script src="src/image.js"></script>
    <script src="src/stage.js"></script>
    <script src="src/player.js"></script>
    <script src="src/game.js"></script>

    <style>
        #stage {
            position: relative;
            margin: 0 auto;
            overflow: hidden;
            background-image: url(img/bg.png);
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            background-color: #faf8f4;
        }

        #stage img {
            position: absolute;
            z-index: 2;
        }

        #stage::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(200, 220, 255, 0.08),
                    rgba(255, 255, 255, 0.15) 40%,
                    rgba(255, 255, 255, 0.25));
            pointer-events: none;
            z-index: 1;
            backdrop-filter: blur(1px);
        }

        #stage {
            border-radius: 20px;
            box-shadow:
                0 10px 25px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        #stage img {
            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.35));
        }

        #stage .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            opacity: 0;
            z-index: 50;
            pointer-events: none;
        }

        #stage .prompt {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 18px;
            text-align: center;
            font: 700 18px/1.2 system-ui, "Noto Sans JP";
            letter-spacing: .08em;
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.45);
            opacity: 0;
            z-index: 60;
            pointer-events: none;
        }
    </style>
</head>

<body style="margin: 0;">
    <div id="stage" style="
    position:relative;
    margin:0 auto;
    overflow:hidden;
    background-image:url(img/bg.png);
    background-repeat:no-repeat;
    background-position:center;
    background-size:contain;
    background-color:#faf8f4;">
    </div>

    <div style="display: none">
        <img src="img/puyo_1.png" id="puyo_1">
        <img src="img/puyo_2.png" id="puyo_2">
        <img src="img/puyo_3.png" id="puyo_3">
        <img src="img/puyo_4.png" id="puyo_4">
        <img src="img/puyo_5.png" id="puyo_5">
        <img src="img/zenkeshi.png" id="zenkeshi">
        <img src="img/batankyu.png" id="batankyu">
    </div>
</body>

</html>
